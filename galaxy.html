<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Roadmap — Programming Fundamentals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e0e8ff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #galaxy-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* SVG node styles */
  .node circle {
    cursor: pointer;
    transition: filter 0.2s, r 0.2s;
  }

  .node circle.status-done {
    filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 16px currentColor);
  }

  .node circle.status-active {
    filter: drop-shadow(0 0 6px currentColor);
    animation: pulse 2s ease-in-out infinite;
  }

  .node circle.status-todo {
    opacity: 0.35;
  }

  .node circle.status-start {
    filter: drop-shadow(0 0 12px #fff) drop-shadow(0 0 24px #aac);
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 4px currentColor); opacity: 0.6; }
    50% { filter: drop-shadow(0 0 12px currentColor) drop-shadow(0 0 20px currentColor); opacity: 1; }
  }

  .node:hover circle {
    filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 28px currentColor) !important;
    opacity: 1 !important;
    animation: none !important;
  }

  .node-label {
    font-size: 9px;
    fill: #b0bcd8;
    text-anchor: middle;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'Courier New', monospace;
  }

  .node:hover .node-label { opacity: 1; }

  .ring-label {
    font-size: 10px;
    fill: #4a5568;
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 2px;
    font-family: 'Courier New', monospace;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(10, 15, 30, 0.95);
    border: 1px solid #2a3a5c;
    border-radius: 8px;
    padding: 10px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 240px;
    z-index: 100;
    box-shadow: 0 0 20px rgba(100, 140, 255, 0.2);
  }

  #tooltip.visible { opacity: 1; }

  #tooltip .tt-label {
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 4px;
  }

  #tooltip .tt-phase {
    font-size: 10px;
    opacity: 0.6;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  #tooltip .tt-desc {
    font-size: 11px;
    opacity: 0.85;
    line-height: 1.5;
  }

  #tooltip .tt-status {
    font-size: 10px;
    margin-top: 6px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
  }

  .status-pill-done { background: rgba(79, 195, 71, 0.2); color: #4fc347; }
  .status-pill-active { background: rgba(79, 147, 247, 0.2); color: #4f93f7; }
  .status-pill-todo { background: rgba(80, 80, 100, 0.2); color: #666; }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    background: rgba(5, 8, 16, 0.8);
    border: 1px solid #1a2a40;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 11px;
  }

  #legend h3 {
    font-size: 10px;
    letter-spacing: 2px;
    color: #4a5578;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    color: #8090b0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Title */
  #title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  #title h1 {
    font-size: 18px;
    letter-spacing: 4px;
    color: #c0ccff;
    text-shadow: 0 0 20px rgba(150, 170, 255, 0.5);
    text-transform: uppercase;
  }

  #title p {
    font-size: 10px;
    color: #3a4a6a;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* Pan/zoom hint */
  #hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    font-size: 10px;
    color: #2a3a5a;
    letter-spacing: 1px;
    text-align: right;
  }
</style>
</head>

  { source: 'f5_complex',  target: 'f5_crypto'    },

  // Fase 5 → Fase 6
  { source: 'f5_complex', target: 'f6_arch'  },
  { source: 'f4_patterns', target: 'f6_solid' },
  { source: 'f6_solid',  target: 'f6_clean'  },
  { source: 'f6_clean',  target: 'f6_tests'  },
  { source: 'f6_tests',  target: 'f6_arch'   },
  { source: 'f6_arch',   target: 'f6_cicd'   },
];

// ─── STARFIELD ───────────────────────────────────────────────────────────────

(function initStars() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.1,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.003,
        drift: (Math.random() - 0.5) * 0.02,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.a += s.da;
      if (s.a <= 0 || s.a >= 1) s.da = -s.da;
      s.x += s.drift;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 210, 255, ${s.a * 0.7})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  makeStars(350);
  draw();
  window.addEventListener('resize', () => { resize(); makeStars(350); });
})();

// ─── GALAXY LAYOUT ───────────────────────────────────────────────────────────

const RING_RADIUS = {
  0: 0,
  1: 110,
  2: 200,
  2.5: 270,
  3: 340,
  3.5: 400,
  4: 465,
  4.5: 520,
  5: 585,
  5.5: 640,
  6: 700,
  7: 760,
};

// Group nodes by ring
const byRing = {};
nodes.forEach(n => {
  if (!byRing[n.ring]) byRing[n.ring] = [];
  byRing[n.ring].push(n);
});

// Assign angular positions: distribute within a sector per ring
// Main rings occupy ~270° arc; sub-rings (x.5) occupy ~180°
// Ring 0 = center (no angle needed)
const SECTOR = {
  0:   { start: 0,   span: Math.PI * 2 },
  1:   { start: 0,   span: Math.PI * 2 },
  2:   { start: -Math.PI * 0.9, span: Math.PI * 1.8 },
  2.5: { start: -Math.PI * 0.7, span: Math.PI * 1.4 },
  3:   { start: -Math.PI * 0.6, span: Math.PI * 1.2 },
  3.5: { start: -Math.PI * 0.3, span: Math.PI * 0.6 },
  4:   { start: Math.PI * 0.1,  span: Math.PI * 1.1 },
  4.5: { start: Math.PI * 0.25, span: Math.PI * 0.6 },
  5:   { start: Math.PI * 0.4,  span: Math.PI * 1.3 },
  5.5: { start: Math.PI * 0.65, span: Math.PI * 0.6 },
  6:   { start: Math.PI * 0.7,  span: Math.PI * 1.5 },
  7:   { start: Math.PI * 0.9,  span: Math.PI * 1.8 },
};

nodes.forEach(n => {
  if (n.ring === 0) {
    n.ax = 0; n.ay = 0;
    return;
  }
  const group = byRing[n.ring];
  const idx = group.indexOf(n);
  const count = group.length;
  const sec = SECTOR[n.ring];
  const angle = count === 1
    ? sec.start + sec.span / 2
    : sec.start + (idx / (count - 1)) * sec.span;
  const r = RING_RADIUS[n.ring];
  n.ax = Math.cos(angle) * r;
  n.ay = Math.sin(angle) * r;
});

// Build lookup
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// ─── RENDER ──────────────────────────────────────────────────────────────────

const svg = d3.select('#galaxy-svg');
const W0 = window.innerWidth, H0 = window.innerHeight;
const cx = W0 / 2, cy = H0 / 2;

// Zoom/pan
const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

const zoom = d3.zoom()
  .scaleExtent([0.3, 3])
  .on('zoom', (event) => {
    g.attr('transform', `translate(${event.transform.x},${event.transform.y}) scale(${event.transform.k})`);
  });

svg.call(zoom);
svg.call(zoom.translateTo, cx, cy);

// ── Ring orbit lines ─────────────────────────────────────────────────────────
const ringOrbitLayer = g.append('g').attr('class', 'ring-orbits');
Object.entries(RING_RADIUS).forEach(([ring, r]) => {
  if (r === 0) return;
  ringOrbitLayer.append('circle')
    .attr('cx', 0).attr('cy', 0)
    .attr('r', r)
    .attr('fill', 'none')
    .attr('stroke', '#0d1528')
    .attr('stroke-width', 1);
});

// ── Ring labels ──────────────────────────────────────────────────────────────
const ringLabelLayer = g.append('g').attr('class', 'ring-labels');
[
  [1, 'FASE 0'],
  [2, 'FASE 1'],
  [3, 'FASE 2'],
  [4, 'FASE 3'],
  [5, 'FASE 4'],
  [6, 'FASE 5'],
  [7, 'FASE 6'],
].forEach(([ring, lbl]) => {
  const r = RING_RADIUS[ring];
  ringLabelLayer.append('text')
    .attr('x', 0)
    .attr('y', -r - 4)
    .attr('class', 'ring-label')
    .text(lbl);
});

// ── Links ────────────────────────────────────────────────────────────────────
const linkLayer = g.append('g').attr('class', 'links');

links.forEach(l => {
  const s = nodeMap[l.source];
  const t = nodeMap[l.target];
  if (!s || !t) return;

  // Determine color: use source phase color with low opacity
  const col = PHASE_COLORS[String(s.phase)] || '#4466aa';

  linkLayer.append('line')
    .attr('x1', s.ax).attr('y1', s.ay)
    .attr('x2', t.ax).attr('y2', t.ay)
    .attr('stroke', col)
    .attr('stroke-width', 0.6)
    .attr('stroke-opacity', 0.18);
});

// ── Nodes ────────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

const nodeLayer = g.append('g').attr('class', 'nodes');

nodes.forEach(n => {
  const color = PHASE_COLORS[String(n.phase)] || '#ffffff';
  const grp = nodeLayer.append('g')
    .attr('class', 'node')
    .attr('transform', `translate(${n.ax},${n.ay})`);

  // Outer glow ring for done/active
  if (n.status === 'done' || n.status === 'active') {
    grp.append('circle')
      .attr('r', n.size + 4)
      .attr('fill', 'none')
      .attr('stroke', color)
      .attr('stroke-width', 1)
      .attr('stroke-opacity', 0.15);
  }

  const circ = grp.append('circle')
    .attr('r', n.size)
    .attr('fill', n.status === 'todo' ? '#0d1528' : color)
    .attr('stroke', color)
    .attr('stroke-width', n.status === 'todo' ? 1 : 1.5)
    .attr('class', `status-${n.status}`)
    .style('color', color);

  // Label
  const labelLines = n.label.split('\n');
  const labelGrp = grp.append('g').attr('class', 'node-label-group');
  labelLines.forEach((line, i) => {
    labelGrp.append('text')
      .attr('class', 'node-label')
      .attr('x', 0)
      .attr('y', n.size + 12 + i * 11)
      .text(line);
  });

  // Always-visible label for ring 0-1 (core nodes)
  if (n.ring <= 1) {
    labelGrp.selectAll('text').style('opacity', 1);
  }

  // Tooltip events
  grp
    .on('mouseover', function(event) {
      const statusLabels = { done: 'Concluído', active: 'Em andamento', todo: 'Bloqueado / A fazer' };
      const statusClasses = { done: 'status-pill-done', active: 'status-pill-active', todo: 'status-pill-todo' };
      tooltip.querySelector('.tt-label').textContent = n.label.replace('\n', ' ');
      tooltip.querySelector('.tt-label').style.color = color;
      tooltip.querySelector('.tt-phase').textContent = PHASE_NAMES[String(n.phase)] || '';
      tooltip.querySelector('.tt-desc').textContent = n.desc;
      const pill = tooltip.querySelector('.tt-status');
      pill.textContent = statusLabels[n.status];
      pill.className = `tt-status ${statusClasses[n.status]}`;
      tooltip.classList.add('visible');
      positionTooltip(event);
    })
    .on('mousemove', positionTooltip)
    .on('mouseleave', function() {
      tooltip.classList.remove('visible');
    });
});

function positionTooltip(event) {
  const tw = tooltip.offsetWidth || 240;
  const th = tooltip.offsetHeight || 80;
  let x = event.clientX + 14;
  let y = event.clientY - 10;
  if (x + tw > window.innerWidth - 10) x = event.clientX - tw - 14;
  if (y + th > window.innerHeight - 10) y = window.innerHeight - th - 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const nw = window.innerWidth, nh = window.innerHeight;
  zoom.translateTo(svg, nw / 2, nh / 2);
});
</script>
</body>
