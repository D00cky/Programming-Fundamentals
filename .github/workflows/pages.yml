name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.30

      - name: Prepare docs directory
        run: |
          mkdir -p content
          for item in README.md docs fase0-fundacao fase1-c fase2-sistemas fase3-cpp fase4-java fase5-teoria-cs fase6-eng-software; do
            [ -e "$item" ] && ln -sf "$(pwd)/$item" "content/$item" || true
          done

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
